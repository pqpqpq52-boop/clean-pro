<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLEAN PRO PRO</title>

<link rel="manifest" href="manifest.json">

<style>
body{margin:0;font-family:-apple-system;background:#f1f5f9;}
nav{position:fixed;bottom:0;width:100%;display:flex;background:#1e293b;}
nav div{flex:1;color:white;text-align:center;padding:12px;font-size:12px;}
nav .active{background:#2563eb;}
.page{display:none;padding:10px;padding-bottom:70px;}
.page.active{display:block;}
input,button,select{width:100%;padding:12px;margin-bottom:8px;font-size:16px;border-radius:8px;border:1px solid #ccc;}
button{background:#2563eb;color:white;border:none;}
.card{background:white;padding:10px;border-radius:10px;margin-bottom:8px;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);}
.day{background:white;min-height:70px;border:1px solid #eee;font-size:11px;padding:2px;}
.ev{background:#2563eb;color:white;margin-top:2px;border-radius:3px;padding:2px;font-size:10px;}
</style>
</head>

<body>

<!-- 予約 -->
<div id="p-book" class="page active">
<h3>カレンダー</h3>
<div id="cal"></div>

<h3>予約入力</h3>
<input id="b-name" placeholder="顧客名">
<input id="b-date" type="date">
<input id="b-time" type="time">
<input id="b-price" type="number" placeholder="金額">
<button onclick="saveB()">保存</button>
</div>

<!-- 顧客 -->
<div id="p-cust" class="page">
<h3>顧客</h3>
<input id="c-name" placeholder="名前">
<button onclick="saveC()">保存</button>
<div id="c-list"></div>
</div>

<!-- 売上 -->
<div id="p-sale" class="page">
<h3>売上</h3>
<div id="s-total"></div>
</div>

<nav>
<div onclick="tab('book')" class="active">予約</div>
<div onclick="tab('cust')">顧客</div>
<div onclick="tab('sale')">売上</div>
</nav>

<script>
const KB="cp_b_v70";
const KC="cp_c_v70";

let dbB=JSON.parse(localStorage.getItem(KB))||[];
let dbC=JSON.parse(localStorage.getItem(KC))||[];

function tab(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('nav div').forEach(x=>x.classList.remove('active'));
document.getElementById('p-'+p).classList.add('active');
event.target.classList.add('active');
}

function getCust(name){
return dbC.find(c=>c.name===name);
}

function saveC(){
const name=document.getElementById("c-name").value;
if(!name)return;
dbC.push({id:Date.now(),name});
localStorage.setItem(KC,JSON.stringify(dbC));
renderC();
}

function saveB(){
const name=document.getElementById("b-name").value;
if(!name)return alert("名前必須");

let cust=getCust(name);
if(!cust){
cust={id:Date.now(),name};
dbC.push(cust);
}

const data={
id:Date.now(),
customerId:cust.id,
date:document.getElementById("b-date").value,
time:document.getElementById("b-time").value,
price:parseInt(document.getElementById("b-price").value)||0
};

dbB.push(data);
localStorage.setItem(KB,JSON.stringify(dbB));
localStorage.setItem(KC,JSON.stringify(dbC));

render();
}

function renderCal(){
const el=document.getElementById("cal");
el.innerHTML="";
const now=new Date();
const y=now.getFullYear();
const m=now.getMonth();

const first=new Date(y,m,1).getDay();
const last=new Date(y,m+1,0).getDate();

let html="<div class='cal'>";
for(let i=0;i<first;i++)html+="<div></div>";

for(let d=1;d<=last;d++){
const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const evs=dbB.filter(b=>b.date===ds);

html+=`<div class="day" onclick="setDate('${ds}')"><b>${d}</b>`;
evs.forEach(e=>{
const c=dbC.find(x=>x.id===e.customerId);
html+=`<div class="ev">${c?c.name:"?"}</div>`;
});
html+="</div>";
}
html+="</div>";
el.innerHTML=html;
}

function setDate(d){
document.getElementById("b-date").value=d;
}

function renderC(){
const el=document.getElementById("c-list");
el.innerHTML="";
dbC.forEach(c=>{
el.innerHTML+=`<div class="card">${c.name}</div>`;
});
}

function renderS(){
let total=0;
dbB.forEach(b=>total+=b.price);
document.getElementById("s-total").innerHTML="合計: ¥"+total.toLocaleString();
}

function render(){
renderCal();
renderC();
renderS();
}

render();

// PWA
if('serviceWorker' in navigator){
navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
