<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CLEAN-PRO v49.3 (Compatibility Mode)</title>
    <style>
        :root { --p: #2563eb; --s: #64748b; --bg: #f1f5f9; --white: #ffffff; --border: #e2e8f0; }
        .c-blue { background: #dbeafe !important; color: #1e40af !important; border-left: 4px solid #2563eb !important; }
        .c-green { background: #dcfce7 !important; color: #166534 !important; border-left: 4px solid #22c55e !important; }
        .c-yellow { background: #fef9c3 !important; color: #854d0e !important; border-left: 4px solid #eab308 !important; }
        .c-red { background: #fee2e2 !important; color: #991b1b !important; border-left: 4px solid #ef4444 !important; }
        
        body { font-family: 'Segoe UI', Meiryo, sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; color: #1e293b; font-size: 14px; }
        nav { width: 80px; background: #1e293b; color: white; display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; flex-shrink: 0; }
        nav .menu { cursor: pointer; text-align: center; font-size: 11px; opacity: 0.6; transition: 0.2s; width: 100%; }
        nav .menu.active { opacity: 1; color: #38bdf8; border-right: 3px solid #38bdf8; }
        nav .icon { font-size: 26px; display: block; margin-bottom: 5px; }
        
        main { flex: 1; overflow-y: auto; padding: 25px; box-sizing: border-box; }
        .page { display: none; max-width: 1800px; margin: 0 auto; }
        .page.active { display: block; }
        
        .grid { display: grid; grid-template-columns: 1fr 450px; gap: 20px; align-items: start; }
        .panel { background: var(--white); padding: 22px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { margin: 0 0 20px; font-size: 1.25rem; border-left: 5px solid var(--p); padding-left: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .f-item { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--s); margin-bottom: 6px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; box-sizing: border-box; background: #fff; }
        
        .svc-checks { border: 1px solid var(--border); border-radius: 8px; padding: 12px; max-height: 180px; overflow-y: auto; background: #fdfdfd; display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
        .svc-check-item { display: flex; align-items: center; gap: 6px; padding: 4px 6px; cursor: pointer; font-size: 11.5px; border-radius: 4px; }
        .svc-check-item:hover { background: #f1f5f9; }
        .svc-check-item input { width: 14px; height: 14px; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); border: 1px solid var(--border); border-radius: 10px; background: white; overflow: hidden; }
        .cal-w { background: #f8fafc; padding: 12px; text-align: center; font-weight: bold; border-bottom: 2px solid var(--border); }
        .cal-d { min-height: 120px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 6px; position: relative; cursor: pointer; }
        .ev { font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-top: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
        
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 14px; background: #f8fafc; border-bottom: 2px solid var(--border); cursor: pointer; position: sticky; top: 0; z-index: 10; }
        td { padding: 14px; border-bottom: 1px solid #f1f5f9; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; font-size: 14px; margin-top: 8px; transition: 0.2s; }
        .btn-p { background: var(--p); color: white; }
        .btn-s { background: #f1f5f9; color: var(--s); }
        .btn-map { background: #34d399; color: white; text-align: center; text-decoration: none; display: block; padding: 10px; border-radius: 8px; font-size: 13px; margin-top: 5px; }
        .btn-d { background: #ef4444; color: white; }

        .history-box { margin-top: 15px; padding: 12px; background: #f8fafc; border-radius: 10px; border: 1px solid var(--border); }
        .hist-scroll { max-height: 250px; overflow-y: auto; }
        .hist-item { font-size: 12px; padding: 6px 0; border-bottom: 1px dotted #cbd5e1; display: flex; justify-content: space-between; }
        
        .color-dot { width: 22px; height: 22px; border-radius: 50%; display: inline-block; cursor: pointer; border: 3px solid transparent; }
        .color-dot.active { border-color: #334155; transform: scale(1.1); }
        .search-res { position: absolute; background: white; width: 100%; z-index: 1000; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-height: 250px; overflow-y: auto; display: none; }
        .search-res div { padding: 12px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }

        .stat-bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .stat-bar-label { width: 120px; font-weight: bold; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .stat-bar-bg { flex: 1; height: 16px; background: #f1f5f9; border-radius: 8px; overflow: hidden; }
        .stat-bar-fill { height: 100%; background: var(--p); border-radius: 8px; transition: 0.5s; }
        .stat-bar-val { width: 100px; text-align: right; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

<nav>
    <div class="menu active" onclick="tab('book')"><span class="icon">📅</span>予約</div>
    <div class="menu" onclick="tab('cust')"><span class="icon">👤</span>顧客</div>
    <div class="menu" onclick="tab('sale')"><span class="icon">📈</span>売上</div>
    <div class="menu" onclick="tab('sys')"><span class="icon">💾</span>保守</div>
</nav>

<main>
    <div id="p-book" class="page active">
        <div class="grid">
            <div class="panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div><select id="calY" onchange="render()" style="width:100px;"></select> <select id="calM" onchange="render()" style="width:80px;"></select></div>
                    <h2 id="calLabel" style="margin:0; border:none;"></h2>
                    <button onclick="moveMonth(1)" class="btn-s" style="width:auto; padding:8px 20px;">次月▶</button>
                </div>
                <div id="calGrid" class="cal-grid"></div>
            </div>
            <div class="panel" id="b-form">
                <h2 id="bf-title">予約入力</h2>
                <input type="hidden" id="b-id">
                <div class="f-item"><label>顧客名 (検索/新規入力)</label><input type="text" id="b-name" oninput="searchC(this.value)" autocomplete="off"><div id="b-res" class="search-res"></div></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="f-item"><label>日付</label><input type="date" id="b-date"></div>
                    <div class="f-item"><label>時間</label><input type="time" id="b-time"></div>
                </div>
                <div class="f-item"><label>サービス内容</label><div id="b-svc-area" class="svc-checks"></div></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="f-item"><label>金額(税込)</label><input type="number" id="b-price" placeholder="¥ 0"></div>
                    <div class="f-item"><label>支払方法</label>
                        <select id="b-pay">
                            <option value="現金">現金</option>
                            <option value="クレジット決済">クレジット決済</option>
                            <option value="オンライン決済">オンライン決済</option>
                            <option value="請求書">請求書</option>
                            <option value="PayPay">PayPay</option>
                            <option value="後払い">後払い</option>
                            <option value="その他">その他</option>
                        </select>
                    </div>
                </div>
                <div class="f-item"><label>駐車場</label>
                    <select id="b-park"><option value="無">無</option><option value="有">有</option><option value="コインパーキング">コインパーキング</option></select>
                </div>
                <div class="f-item"><label>作業メモ</label><textarea id="b-note" rows="3"></textarea></div>
                <button class="btn btn-p" onclick="saveB()">💾 予約保存</button>
                <button id="b-del-btn" class="btn btn-d" style="display:none;" onclick="delB()">削除</button>
                <button class="btn btn-s" onclick="resetB()">クリア</button>
            </div>
        </div>
    </div>

    <div id="p-cust" class="page">
        <div class="grid">
            <div class="panel">
                <h2>顧客名簿 <button class="btn-s" style="width:auto; padding:6px 15px; font-size:12px;" onclick="extractCustList()">📋 抽出</button></h2>
                <input type="text" id="c-q" onkeyup="renderC()" placeholder="🔍 検索..." style="margin-bottom:15px;">
                <div style="max-height:750px; overflow-y:auto;">
                    <table>
                        <thead>
                            <tr><th onclick="sortC('kana')">氏名(かな) ↕</th><th onclick="sortC('area')">地域 ↕</th><th onclick="sortC('count')">回数 ↕</th><th onclick="sortC('total')">合計 ↕</th><th>操作</th></tr>
                        </thead>
                        <tbody id="c-list"></tbody>
                    </table>
                </div>
            </div>
            <div class="panel">
                <h2 id="cf-title">顧客詳細</h2>
                <input type="hidden" id="c-id">
                <div id="c-history" class="history-box" style="display:none;">
                    <div style="font-weight:bold; color:var(--p); border-bottom:2px solid var(--p); margin-bottom:8px; display:flex; justify-content:space-between;"><span>📈 利用履歴</span><span id="hist-total-count">0回</span></div>
                    <div id="hist-content" class="hist-scroll"></div>
                </div>
                <label>ラベル色</label>
                <div style="display:flex; gap:12px; margin-bottom:15px;">
                    <div class="color-dot c-blue active" data-color="blue" onclick="sc(this)"></div><div class="color-dot c-green" data-color="green" onclick="sc(this)"></div><div class="color-dot c-yellow" data-color="yellow" onclick="sc(this)"></div><div class="color-dot c-red" data-color="red" onclick="sc(this)"></div>
                    <input type="hidden" id="c-color" value="blue">
                </div>
                <div class="f-item"><label>名前</label><input type="text" id="c-name" oninput="checkDup(this.value)"><div id="dup-warn" style="color:red; display:none;">⚠️ 同姓同名あり</div></div>
                <div class="f-item"><label>ふりがな</label><input type="text" id="c-kana"></div>
                <div class="f-item"><label>メール</label><input type="email" id="c-mail"></div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
                    <div class="f-item"><label>電話番号</label><input type="tel" id="c-tel"></div>
                    <div class="f-item"><label>地域</label><input type="text" id="c-area"></div>
                </div>
                <div class="f-item"><label>詳細住所</label><input type="text" id="c-addr"><a id="map-link" href="#" target="_blank" class="btn-map" style="display:none;">📍 Googleマップ</a></div>
                <div class="f-item"><label>備考1</label><textarea id="c-memo" rows="2"></textarea></div>
                <div class="f-item"><label>備考2</label><textarea id="c-memo2" rows="2"></textarea></div>
                <button class="btn btn-p" onclick="saveC()">👤 保存</button>
                <button id="c-del-btn" class="btn btn-d" style="display:none;" onclick="delC()">削除</button>
                <button class="btn btn-s" onclick="resetC()">クリア</button>
            </div>
        </div>
    </div>

    <div id="p-sale" class="page">
        <div class="panel" style="background: #1e293b; color: white;">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h1 style="margin:0; font-size:1.5rem;">売上分析</h1>
                <div style="display:flex; gap:10px;">
                    <select id="s-year" onchange="renderS()" style="width:120px; color:black;"></select>
                    <select id="s-month" onchange="renderS()" style="width:120px; color:black;">
                        <option value="all">年間合計</option>
                        <option value="01">1月</option><option value="02">2月</option><option value="03">3月</option><option value="04">4月</option>
                        <option value="05">5月</option><option value="06">6月</option><option value="07">7月</option><option value="08">8月</option>
                        <option value="09">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
                    </select>
                </div>
            </div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:20px;">
            <div class="panel"><h2>地域別</h2><div id="area-stats-list"></div></div>
            <div class="panel"><h2>サービス別</h2><div id="svc-stats-list"></div></div>
            <div class="panel"><h2>月別推移</h2><div id="m-stats"></div></div>
        </div>
        <div class="panel"><h2>売上明細</h2><div style="max-height:400px; overflow-y:auto;"><table><thead><tr><th>日付</th><th>地域</th><th>顧客名</th><th>金額</th></tr></thead><tbody id="s-list"></tbody></table></div><button class="btn btn-s" onclick="csv()" style="width:auto;">CSV出力</button></div>
    </div>

    <div id="p-sys" class="page">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
            <div class="panel">
                <h2>サービスマスタ</h2>
                <div style="display:flex; gap:8px;"><input type="text" id="new-svc"><button class="btn btn-p" onclick="addSvc()" style="width:auto; margin:0;">追加</button></div>
                <div id="svc-list"></div>
            </div>
            <div class="panel" style="text-align: center;">
                <h2>データ保守</h2>
                <button class="btn btn-p" style="background:#059669;" onclick="expD()">📂 全データをバックアップ</button>
                <div style="margin-top:30px;"><input type="file" id="impF" accept=".json" style="display:none;" onchange="impD(this)"><button class="btn btn-s" onclick="document.getElementById('impF').click()">📤 復元</button></div>
            </div>
        </div>
    </div>
</main>

<script>
    // キー設定
    const K_B = 'cp_b_v49', K_C = 'cp_c_v49', K_S = 'cp_s_v49';
    
    // データ初期化 (旧キーからの読み込みも考慮)
    function getDB(key) {
        try {
            return JSON.parse(localStorage.getItem(key));
        } catch(e) { return null; }
    }

    let dbB = getDB(K_B) || [];
    let dbC = getDB(K_C) || [];
    let dbS = getDB(K_S) || ["エアコンクリーニング", "空室清掃", "換気扇掃除"];
    let curSort = { key: 'kana', asc: true };

    function tab(p) { document.querySelectorAll('.page, .menu').forEach(x=>x.classList.remove('active')); document.getElementById('p-'+p).classList.add('active'); document.querySelector(`div[onclick="tab('${p}')"]`).classList.add('active'); render(); }
    function sc(el) { document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active')); el.classList.add('active'); document.getElementById('c-color').value = el.dataset.color; }

    function renderSvc() {
        document.getElementById('b-svc-area').innerHTML = dbS.map(s=>`<label class="svc-check-item"><input type="checkbox" name="svcs" value="${s}"> ${s}</label>`).join('');
        document.getElementById('svc-list').innerHTML = dbS.map((s,i)=>`<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee;"><span>${s}</span><button onclick="delSvc(${i})" style="color:red; border:none; background:none;">✖</button></div>`).join('');
    }
    function addSvc() { const v = document.getElementById('new-svc').value; if(v){dbS.push(v); localStorage.setItem(K_S, JSON.stringify(dbS)); document.getElementById('new-svc').value=''; render();}}
    function delSvc(i) { if(confirm("削除？")){dbS.splice(i,1); localStorage.setItem(K_S, JSON.stringify(dbS)); render();}}

    function saveB() {
        const name = document.getElementById('b-name').value; const date = document.getElementById('b-date').value; if(!name || !date) return alert("名前と日付は必須です");
        if(!dbC.some(c => c.name === name)) { dbC.push({ id: Date.now(), name, color: 'blue', kana: '', area: '', tel: '', mail: '', memo: '', memo2: '' }); localStorage.setItem(K_C, JSON.stringify(dbC)); }
        const id = document.getElementById('b-id').value; const selSvcs = Array.from(document.querySelectorAll('input[name="svcs"]:checked')).map(cb => cb.value);
        const data = { id: id ? parseInt(id) : Date.now(), name, date, time: document.getElementById('b-time').value, service: selSvcs, price: parseInt(document.getElementById('b-price').value) || 0, pay: document.getElementById('b-pay').value, park: document.getElementById('b-park').value, note: document.getElementById('b-note').value };
        if(id) dbB[dbB.findIndex(x=>x.id==id)] = data; else dbB.push(data); localStorage.setItem(K_B, JSON.stringify(dbB)); resetB(); render();
    }

    function editB(id, e) {
        if(e) e.stopPropagation(); const i = dbB.find(x=>x.id==id); if(!i) return;
        document.getElementById('b-id').value=i.id; document.getElementById('b-name').value=i.name; 
        document.getElementById('b-date').value=i.date; document.getElementById('b-time').value=i.time; document.getElementById('b-price').value=i.price; 
        document.getElementById('b-pay').value=i.pay; document.getElementById('b-park').value=i.park || "無"; document.getElementById('b-note').value=i.note;
        document.querySelectorAll('input[name="svcs"]').forEach(cb => cb.checked = (Array.isArray(i.service)?i.service:[i.service]).includes(cb.value));
        document.getElementById('b-del-btn').style.display='block';
    }

    function saveC() {
        const id = document.getElementById('c-id').value; const name = document.getElementById('c-name').value; if(!name) return alert("名前必須");
        const data = { id: id ? parseInt(id) : Date.now(), color: document.getElementById('c-color').value, name, kana: document.getElementById('c-kana').value, mail: document.getElementById('c-mail').value, area: document.getElementById('c-area').value, addr: document.getElementById('c-addr').value, tel: document.getElementById('c-tel').value, memo: document.getElementById('c-memo').value, memo2: document.getElementById('c-memo2').value };
        if(id) dbC[dbC.findIndex(x=>x.id==id)] = data; else dbC.push(data); localStorage.setItem(K_C, JSON.stringify(dbC)); resetC(); renderC();
    }

    function editC(id) {
        const i = dbC.find(x=>x.id==id); if(!i) return;
        document.getElementById('c-id').value=i.id; document.getElementById('c-name').value=i.name; 
        document.getElementById('c-kana').value=i.kana; document.getElementById('c-mail').value=i.mail||''; document.getElementById('c-area').value=i.area;
        document.getElementById('c-addr').value=i.addr; document.getElementById('c-tel').value=i.tel; document.getElementById('c-memo').value=i.memo||''; document.getElementById('c-memo2').value=i.memo2||'';
        const colorEl = document.querySelector(`.color-dot[data-color="${i.color||'blue'}"]`); if(colorEl) sc(colorEl);
        document.getElementById('c-del-btn').style.display='block';
        if(i.addr){ 
            document.getElementById('map-link').href=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(i.addr)}`; 
            document.getElementById('map-link').style.display='block'; 
        }
        const hists = dbB.filter(b => b.name === i.name).sort((a,b)=>b.date.localeCompare(a.date));
        const box = document.getElementById('c-history');
        if(hists.length > 0) { box.style.display = 'block'; document.getElementById('hist-total-count').innerText = hists.length + '回'; document.getElementById('hist-content').innerHTML = hists.map(h=>`<div class="hist-item"><span><b>${h.date}</b></span><span>${(Array.isArray(h.service)?h.service.join(','):h.service)}</span><span>¥${h.price.toLocaleString()}</span></div>`).join(''); } else box.style.display = 'none';
    }

    function renderC() {
        const q = document.getElementById('c-q').value;
        let list = dbC.filter(c => c.name.includes(q) || (c.kana && c.kana.includes(q)) || (c.area && c.area.includes(q))).map(c => {
            const h = dbB.filter(b => b.name === c.name); return { ...c, count: h.length, total: h.reduce((s,b)=>s+b.price, 0) };
        });
        list.sort((a, b) => { let vA = a[curSort.key], vB = b[curSort.key]; if(typeof vA === 'string') return curSort.asc ? vA.localeCompare(vB) : vB.localeCompare(vA); return curSort.asc ? vA - vB : vB - vA; });
        document.getElementById('c-list').innerHTML = list.map(c => `<tr><td><span class="color-dot c-${c.color}"></span> <b>${c.name}</b><br><small>${c.kana||''}</small></td><td>${c.area||''}</td><td>${c.count}回</td><td>¥${c.total.toLocaleString()}</td><td><button class="btn btn-s" style="width:auto; margin:0;" onclick="editC(${c.id})">詳細</button></td></tr>`).join('');
    }

    function renderS() {
        const sy = document.getElementById('s-year').value;
        const sm = document.getElementById('s-month').value;
        const slist = document.getElementById('s-list'); slist.innerHTML = '';
        const filterKey = sm === 'all' ? sy : `${sy}-${sm}`;
        const fb = dbB.filter(b => b.date.startsWith(filterKey)).sort((a,b)=>b.date.localeCompare(a.date));
        const areaMap = {}, svcMap = {};
        fb.forEach(b => {
            const c = dbC.find(x => x.name === b.name); const area = (c && c.area) ? c.area : "未設定";
            if(!areaMap[area]) areaMap[area] = 0; areaMap[area] += b.price;
            const svcs = Array.isArray(b.service) ? b.service : [b.service];
            svcs.forEach(s => { if(!svcMap[s]) svcMap[s] = 0; svcMap[s] += b.price; });
            slist.innerHTML += `<tr><td>${b.date}</td><td>${area}</td><td>${b.name}</td><td>¥${b.price.toLocaleString()}</td></tr>`;
        });
        const drawBar = (target, data) => {
            const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]);
            const max = sorted.length ? sorted[0][1] : 1;
            document.getElementById(target).innerHTML = sorted.map(([n, v]) => `<div class="stat-bar-row"><div class="stat-bar-label">${n}</div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${(v/max)*100}%"></div></div><div class="stat-bar-val">¥${v.toLocaleString()}</div></div>`).join('');
        };
        drawBar('area-stats-list', areaMap); drawBar('svc-stats-list', svcMap);
        let mH = ''; for(let m=1; m<=12; m++){ 
            const mStr = String(m).padStart(2,'0'); const mt = dbB.filter(b => b.date.startsWith(`${sy}-${mStr}`)).reduce((s,b)=>s+b.price, 0); 
            mH += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #eee; padding:8px 4px;"><span>${m}月</span><b>¥${mt.toLocaleString()}</b></div>`; 
        }
        document.getElementById('m-stats').innerHTML = mH;
    }

    function render() {
        const y = parseInt(document.getElementById('calY').value), m = parseInt(document.getElementById('calM').value);
        document.getElementById('calLabel').innerText = `${y}年 ${m+1}月`;
        const grid = document.getElementById('calGrid'); grid.innerHTML = '日月火水木金土'.split('').map(w => `<div class="cal-w">${w}</div>`).join('');
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += `<div class="cal-d" style="background:#fcfcfc;"></div>`;
        for(let d=1; d<=last; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const evs = dbB.filter(b => b.date === ds).sort((a,b)=>a.time.localeCompare(b.time));
            grid.innerHTML += `<div class="cal-d" onclick="setD('${ds}')"><b>${d}</b>` + 
                evs.map(e => { 
                    const c = dbC.find(x=>x.name===e.name); 
                    return `<div class="ev c-${c?c.color:'blue'}" onclick="editB(${e.id}, event)">${e.time||''} ${e.name}${e.park==='コインパーキング'?'🅿️':''}</div>`; 
                }).join('') + `</div>`;
        }
        renderC(); renderS(); renderSvc();
    }

    function searchC(v) {
        const res = document.getElementById('b-res'); if(!v) { res.style.display='none'; return; }
        const ms = dbC.filter(c => c.name.includes(v) || (c.kana && c.kana.includes(v)));
        res.innerHTML = ms.map(c => `<div onclick="pickC('${c.name}')"><b>${c.name}</b> <small>(${c.area||''})</small></div>`).join('');
        res.style.display = ms.length ? 'block' : 'none';
    }
    function pickC(n) { document.getElementById('b-name').value = n; document.getElementById('b-res').style.display='none'; }
    function setD(d) { resetB(); document.getElementById('b-date').value = d; document.getElementById('b-name').focus(); }
    function moveMonth(n) { let m=parseInt(document.getElementById('calM').value)+n; let y=parseInt(document.getElementById('calY').value); if(m>11){m=0;y++;}else if(m<0){m=11;y--;} document.getElementById('calY').value=y; document.getElementById('calM').value=m; render(); }
    function resetB() { document.getElementById('b-id').value=''; document.querySelectorAll('#b-form input:not([type="checkbox"]), #b-form textarea').forEach(i=>i.value=''); document.querySelectorAll('input[name="svcs"]').forEach(cb=>cb.checked=false); document.getElementById('b-del-btn').style.display='none'; }
    function resetC() { document.getElementById('c-id').value=''; document.querySelectorAll('#p-cust input, #p-cust textarea').forEach(i=>i.value=''); document.getElementById('c-del-btn').style.display='none'; document.getElementById('map-link').style.display='none'; document.getElementById('c-history').style.display='none'; }
    function checkDup(v) { document.getElementById('dup-warn').style.display = (v && dbC.some(c=>c.name===v && c.id!=document.getElementById('c-id').value)) ? 'block' : 'none'; }
    function sortC(k) { if(curSort.key===k) curSort.asc=!curSort.asc; else {curSort.key=k; curSort.asc=true;} renderC(); }
    
    // バックアップ (JSON作成)
    function expD() { 
        const data = {b:dbB, c:dbC, s:dbS};
        const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `CLEAN_PRO_BACKUP.json`; a.click();
    }

    // 復元機能 (互換性重視)
    function impD(f) { 
        const r = new FileReader(); 
        r.onload = (e) => { 
            try {
                const d = JSON.parse(e.target.result);
                // 旧形式(v48など)と新形式(v49)の両方に対応
                const newB = d.b || d.cp_b_v48 || [];
                const newC = d.c || d.cp_c_v48 || [];
                const newS = d.s || d.cp_s_v48 || ["エアコンクリーニング", "空室清掃", "換気扇掃除"];
                
                if(!confirm("現在のデータが上書きされます。よろしいですか？")) return;

                localStorage.setItem(K_B, JSON.stringify(newB)); 
                localStorage.setItem(K_C, JSON.stringify(newC)); 
                localStorage.setItem(K_S, JSON.stringify(newS)); 
                alert("復元が完了しました。ページを再読み込みします。");
                location.reload(); 
            } catch (err) {
                alert("ファイルの読み込みに失敗しました。ファイルが壊れているか、JSON形式ではありません。");
            }
        }; 
        r.readAsText(f.files[0]); 
    }

    function extractCustList() { 
        const sorted = [...dbC].sort((a, b) => (a.kana || "").localeCompare(b.kana || "", 'ja'));
        const text = sorted.map(c => `名前: ${c.name} / かな: ${c.kana||'--'} / TEL: ${c.tel||'--'} / 住所: ${c.area||''}${c.addr||''}`).join('\n'); 
        const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([text], {type: 'text/plain'})); a.download = `顧客リスト.txt`; a.click(); 
    }
    function csv() { let t="\uFEFF日付,地域,顧客名,金額\n"+dbB.map(b=>{const c=dbC.find(x=>x.name===b.name); return `${b.date},${c?c.area:''},${b.name},${b.price}`;}).join("\n"); const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([t],{type:'text/csv'})); a.download='sales.csv'; a.click(); }
    function delB() { if(confirm("予約を削除？")){ dbB=dbB.filter(x=>x.id!=document.getElementById('b-id').value); localStorage.setItem(K_B,JSON.stringify(dbB)); resetB(); render(); } }
    function delC() { if(confirm("顧客を削除？")){ dbC=dbC.filter(x=>x.id!=document.getElementById('c-id').value); localStorage.setItem(K_C,JSON.stringify(dbC)); resetC(); renderC(); } }

    const curY = new Date().getFullYear(); const ySel = document.getElementById('calY'); const sySel = document.getElementById('s-year');
    for(let i=2024; i<=2030; i++) { ySel.add(new Option(i+'年', i)); sySel.add(new Option(i+'年度', i)); }
    ySel.value = curY; sySel.value = curY;
    document.getElementById('calM').innerHTML = [...Array(12)].map((_,i)=>`<option value="${i}">${i+1}月</option>`).join('');
    document.getElementById('calM').value = new Date().getMonth();
    render();
</script>
</body>
</html>
